
<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "bone": "#FFFFFF",
                        "charcoal": "#000000",
                        "primary": "#00D9FF",
                        "warning": "#FF3D00",
                        "success": "#00E676",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "narrow": ["Archivo Narrow", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: white;
            color: black;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::selection {
            background-color: #00D9FF;
            color: black;
        }
        .neo-border { border: 2px solid #000000; }
        .neo-shadow { box-shadow: 6px 6px 0px 0px #000000; }
        .neo-shadow-sm { box-shadow: 4px 4px 0px 0px #000000; }
        .neo-shadow-hover:hover {
            box-shadow: 8px 8px 0px 0px #000000;
            transform: translate(-2px, -2px);
        }
        input[type="range"] {
            appearance: none;
            background: black;
            height: 4px;
            cursor: pointer;
            width: 100%;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background-color: #00D9FF;
            border: 2px solid black;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background-color: #00D9FF;
            border: 2px solid black;
            cursor: pointer;
        }
    </style>
